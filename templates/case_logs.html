<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Case Logs</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header><h1>🧾 Case Logs 
  <span class="tooltip">❔<span class="tooltiptext">Shows all saved patient diagnoses with date</span></span>
</h1></header>
<main class="wrap">
<section class="card">
<table>
  <tr><th>ID</th><th>Time</th><th>Level</th><th>Symptoms</th><th>Risks</th></tr>
  {% for l in logs %}
  <tr>
    <td>{{ l['ID'] }}</td>
    <td>{{ l['Time'] }}</td>
    <td>{{ l['Level'] }}</td>
    <td>{{ l['Symptoms'] }}</td>
    <td>{{ l['Risks'] }}</td>
  </tr>
  {% endfor %}
</table>
<a href="{{ url_for('index') }}" class="btn">⬅ Back</a>
</section>
</main>
</body>
</html>
