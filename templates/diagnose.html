<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Diagnosis Result</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header><h1>Diagnosis Result 
  <span class="tooltip">❔<span class="tooltiptext">Shows triage level, reason & computed score</span></span>
</h1></header>

<main class="wrap">
<section class="card result">
  <div class="result-header">
    <div class="urgency {{ level|lower }}">{{ level }}</div>
    <div><strong>Reason:</strong> {{ reason }}</div>
  </div>
  <div>
    <strong>Score breakdown:</strong>
    <pre>{{ breakdown | tojson(indent=2) }}</pre>
  </div>
  <div class="footer-btns">
    <a href="{{ url_for('visualize') }}" class="btn">📊 View Charts</a>
    <a href="{{ url_for('index') }}" class="btn">⬅ Back</a>
  </div>
</section>
</main>
</body>
</html>
